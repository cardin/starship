# Design Philosophy:
# - Lazy to debug formatting
# - Lazy to test colors
# - Easier to just use an existing color scheme and design
#
# To install:
# wget https://raw.githubusercontent.com/cardin/starship/refs/heads/mod/docs/public/presets/toml/gruvbox-rainbow.toml -O $STARSHIP_CONFIG

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](color_bg1)\
$os\
[Ņé░](fg:prev_fg bg:color_orange)\
$username\
$hostname\
[Ņé░](fg:prev_bg bg:color_yellow)\
$directory\
[Ņé░](fg:prev_bg bg:color_aqua)\
$git_branch\
$git_commit\
$git_status\
[Ņé░](fg:prev_bg bg:color_blue)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](fg:prev_bg bg:color_bg3)\
$docker_context\
$conda\
$jobs\
[Ņé░](fg:prev_bg bg:color_bg1)\
$time\
$cmd_duration\
$memory_usage\
[Ņé┤ ](fg:prev_bg)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:prev_bg fg:prev_bg"
format = "[$symbol ]($style)"

[os.symbols]
Windows = "[Ņ£Å](fg:blue bg:prev_fg)"
Ubuntu = "[’īø](fg:yellow bg:prev_fg)"
SUSE = "[’īö](fg:green bg:prev_fg)"
Raspbian = "[¾░É┐](fg:red bg:prev_fg)"
Mint = "[¾░ŻŁ](fg:green bg:prev_fg)"
Macos = "[¾░ĆĄ](fg:white bg:prev_fg)"
Manjaro = "[’īÆ](fg:green bg:prev_fg)"
Linux = "[¾░īĮ](fg:white bg:prev_fg)"
Gentoo = "[¾░Ż©](fg:white bg:prev_fg)"
Fedora = "[¾░Żø](fg:red bg:prev_fg)"
Alpine = "[’īĆ](fg:cyan bg:prev_fg)"
Amazon = "[’ē░](fg:yellow bg:prev_fg)"
Android = "[Ņ£Ä](fg:green bg:prev_fg)"
Arch = "[¾░Żć](fg:blue bg:prev_fg)"
