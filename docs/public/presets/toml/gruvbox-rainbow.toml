"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](color_orange)\
$os\
$username\
$hostname\
$localip\
[î‚°](bg:color_yellow fg:color_orange)\
$directory\
[î‚°](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[î‚°](fg:color_aqua bg:color_blue)\
$nodejs\
$java\
$python\
[î‚°](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$jobs\
[î‚°](fg:color_bg3 bg:color_bg1)\
$time\
$cmd_duration\
[î‚´ ](fg:color_bg1)\
$memory_usage\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fdf7df'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"
format = "[$symbol ]($style)"

[os.symbols]
Windows = "îœڈ"
Ubuntu = "ïŒ›"
Alpine = "ïŒ€"
CentOS = "ïŒ„"
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"

[username]
# by default only shows on SSH
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:bold color_red"
format = '[$user ]($style)'

[hostname]
# by default only shows on SSH
ssh_symbol = "َ°¢©"
style = "bg:color_orange fg:color_fg0"
format = "[$ssh_symbol $hostname ]($style)"

[localip]
# by default only shows on SSH. Continuation of hostname
disabled = false
style = "bg:color_orange fg:color_fg0"
format = "[َ±¦‚ $localipv4 ]($style)"

[directory]
style = "fg:color_fg0 bg:color_yellow"
read_only_style = "fg:color_red bg:color_yellow"
format = "[ $path ]($style)[$read_only]($read_only_style)"
truncation_length = 3
truncation_symbol = "â€¦/"
truncate_to_repo = false
read_only = "َ°Œ¾ "

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"/mnt/c" = "C: "
"/mnt/d" = "D: "

[git_branch]
symbol = "ïگک"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[nodejs]
symbol = "îœک"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
version_format = "${major}"

[java]
symbol = "î‰–"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
version_format = "${major}"

[python]
symbol = "îک†"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
version_format = "${major}.${minor}"

[docker_context]
symbol = "ïŒˆ"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[conda]
symbol = "ï„Œ"
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'

[jobs]
symbol = "َ°†…"
style = "bg:color_bg3"
format = "[[ $symbol( $number) ](fg:#83a598 bg:color_bg3)]($style)"
number_threshold = 1

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ ïگ؛ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[cmd_duration]
style = "bg:color_bg1"
format = "[[ ï‰’ $duration ](fg:color_fg0 bg:color_bg1)]($style)"
min_time = 1000

[memory_usage]
symbol = "َ°چ›"
format = "[$symbol ${ram}( َ°¾µ ${swap})](bold color_red) "
disabled = false

[character]
success_symbol = '[ï„…](bold fg:color_green)'
error_symbol = '[ï„…](bold fg:color_red)'
vimcmd_symbol = '[ï„„](bold fg:color_green)'
vimcmd_replace_one_symbol = '[ï„„](bold fg:color_purple)'
vimcmd_replace_symbol = '[ï„„](bold fg:color_purple)'
vimcmd_visual_symbol = '[ï„„](bold fg:color_yellow)'
